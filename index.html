<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Showcase</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, sans-serif;
  background: #f5f7fb;
  color: #111827;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

.container {
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 24px;
}

.header {
  margin-bottom: 24px;
}

.header h1 {
  font-size: 2rem;
  margin-bottom: 8px;
}

.header p {
  color: #6b7280;
}

.cards {
  display: grid;
  gap: 16px;
}

.card {
  display: block;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 20px;
  text-decoration: none;
  color: inherit;
  transition: 0.2s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
}

.card-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 6px;
}

.card-desc {
  color: #6b7280;
  line-height: 1.5;
}

.footer {
  margin-top: auto;
  padding: 20px;
  text-align: center;
  border-top: 1px solid #e5e7eb;
  color: #6b7280;
  background: #fff;
}
</style>
</head>
<body>

<main class="container">
  <div class="header">
    <h1>UI Showcase</h1>
    <p>Collection of UI design examples.</p>
  </div>

  <div class="cards">
    <a href="./finance-accounts.html" class="card">
      <div class="card-title">💰 Finance Accounts UI</div>
      <div class="card-desc">
        Account summary and finance dashboard interface.
      </div>
    </a>

    <a href="./phonepe-history.html" class="card">
      <div class="card-title">📱 PhonePe History UI</div>
      <div class="card-desc">
        Transaction history screen inspired by PhonePe.
      </div>
    </a>
  </div>
</main>

<footer class="footer">
  © 2026 Satish Sharma
</footer>

</body>
</html>
